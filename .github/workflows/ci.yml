name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff pyflakes

      - name: Ruff lint (style + import order)
        run: ruff check src/ frontend/ --select E,F,I --ignore E501

      - name: Pyflakes (undefined names)
        run: python -m pyflakes src/ frontend/

  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      # Fake keys so modules that read Config() at import time don't crash.
      # Real secrets are NOT needed for unit tests (all external calls are mocked).
      GROQ_API_KEY: gsk-fake-groq-key-for-ci
      PINECONE_API_KEY: fake-pinecone-key
      PINECONE_INDEX_NAME: documind
      SUPABASE_URL: https://fake.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install the package in editable mode so `from src.*` works
          pip install -e ".[dev]" || pip install -e .
          # Core runtime deps. Embeddings are now a LOCAL sentence-transformers
          # model, so torch/transformers come in via the editable install above;
          # the test suite stubs the model so it's never actually loaded/downloaded.
          pip install \
            fastapi uvicorn httpx pydantic[email] python-multipart python-dotenv \
            langchain langchain-groq langchain-huggingface langchain-pinecone langchain-core \
            sentence-transformers tiktoken \
            pytest pytest-asyncio pytest-mock \
            streamlit \
            redis fakeredis

      - name: Syntax check (all Python files)
        run: |
          python -c "
          import py_compile, sys, pathlib
          files = list(pathlib.Path('src').rglob('*.py')) + list(pathlib.Path('frontend').rglob('*.py'))
          errors = []
          for f in files:
              try:
                  py_compile.compile(str(f), doraise=True)
              except py_compile.PyCompileError as e:
                  print(f'ERR {f}: {e}')
                  errors.append(f)
          if errors:
              sys.exit(1)
          print(f'All {len(files)} files OK')
          "

      - name: Run unit tests
        run: |
          # Run tests if the tests/ directory exists and has test files
          if [ -d "tests" ] && find tests -name 'test_*.py' | grep -q .; then
            pytest tests/ -v --tb=short
          else
            echo "No test files found yet — skipping pytest."
          fi

  # ────────────────────────────────────────────────────────────────────────────
  api-import-check:
    name: FastAPI App Import Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      GROQ_API_KEY: gsk-fake-groq-key-for-ci
      PINECONE_API_KEY: fake-pinecone-key
      PINECONE_INDEX_NAME: documind
      SUPABASE_URL: https://fake.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API dependencies
        run: |
          pip install --upgrade pip
          pip install -e . || true
          pip install \
            fastapi uvicorn httpx pydantic[email] python-multipart python-dotenv \
            langchain langchain-groq langchain-huggingface langchain-pinecone langchain-core \
            sentence-transformers tiktoken supabase

      - name: Verify FastAPI app imports without errors
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          # Import config and routers — will fail if there are import-time errors
          from src.components.config import Config
          from src.api.router import auth, chat, documents
          print('All API modules imported successfully')
          "

  # ────────────────────────────────────────────────────────────────────────────
  # Continuous deployment to Azure Container Apps. Runs ONLY on a green push to
  # master (never on PRs), so the lint + test + import gates above must pass
  # first. Requires a one-time Azure + GitHub setup — see DEPLOY_AZURE.md.
  #
  #   Repo secrets (Settings → Secrets):   AZURE_CLIENT_ID, AZURE_TENANT_ID,
  #                                         AZURE_SUBSCRIPTION_ID   (OIDC login)
  #   Repo variables (Settings → Variables): AZURE_RESOURCE_GROUP, AZURE_ACR_NAME,
  #                                           AZURE_API_APP, AZURE_FRONTEND_APP
  #
  # If those aren't set, the job no-ops (the `if` guard) instead of failing red.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [test, api-import-check]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      vars.AZURE_ACR_NAME != ''
    permissions:
      id-token: write      # request the OIDC token for passwordless Azure login
      contents: read
    env:
      RG: ${{ vars.AZURE_RESOURCE_GROUP }}
      ACR: ${{ vars.AZURE_ACR_NAME }}
      API_APP: ${{ vars.AZURE_API_APP }}
      FRONTEND_APP: ${{ vars.AZURE_FRONTEND_APP }}
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The api image is ~3.6GB and the runner ships with ~25GB of preinstalled
      # toolchains we never use. Reclaiming them first keeps the build off the
      # disk-full cliff.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h / | tail -1

      - name: Azure login (OIDC — no stored passwords)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # NOT `az acr build`: ACR Tasks is blocked on this subscription
      # (TasksOperationsNotAllowed — Azure disables cloud builds on free/new
      # subscriptions). So the runner builds with its own Docker daemon and
      # pushes. `az acr login` mints a registry token from the OIDC login above,
      # so there is still no stored password. Contributor on the resource group
      # covers ACR push.
      - name: Authenticate Docker to the registry
        run: az acr login -n "$ACR"

      # The frontend inlines NEXT_PUBLIC_API_BASE into its CLIENT bundle at BUILD
      # time — it cannot be changed at runtime, so the api's real URL must be
      # known here. Resolved before either build: the api app already exists and
      # its FQDN is stable across revisions, so there's no need to deploy first.
      - name: Resolve the api's public URL
        run: |
          FQDN=$(az containerapp show -n "$API_APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          test -n "$FQDN" || { echo "::error::api app '$API_APP' has no ingress FQDN — is it created?"; exit 1; }
          echo "API_BASE=https://$FQDN" >> "$GITHUB_ENV"

      - name: Build & push the api image
        run: |
          docker build -t "$ACR.azurecr.io/documind-api:$TAG" -t "$ACR.azurecr.io/documind-api:latest" -f Dockerfile .
          docker push "$ACR.azurecr.io/documind-api:$TAG"
          docker push "$ACR.azurecr.io/documind-api:latest"

      - name: Build & push the frontend image
        run: |
          docker build -t "$ACR.azurecr.io/documind-frontend:$TAG" -t "$ACR.azurecr.io/documind-frontend:latest" \
            --build-arg "NEXT_PUBLIC_API_BASE=$API_BASE" ./frontend-next
          docker push "$ACR.azurecr.io/documind-frontend:$TAG"
          docker push "$ACR.azurecr.io/documind-frontend:latest"

      # Both images are pushed before either app is updated, so a build failure
      # can't leave the api on the new revision and the frontend on the old one.
      - name: Deploy the api
        run: az containerapp update -n "$API_APP" -g "$RG" --image "$ACR.azurecr.io/documind-api:$TAG"

      - name: Deploy the frontend
        run: az containerapp update -n "$FRONTEND_APP" -g "$RG" --image "$ACR.azurecr.io/documind-frontend:$TAG"

      - name: Verify the api came back healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 "$API_BASE/health"; then echo "  <- api healthy"; exit 0; fi
            sleep 10
          done
          echo "::error::api did not return healthy within 5 minutes of deploy"
          exit 1
