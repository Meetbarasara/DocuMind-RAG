# The KYC Compliance stack: the FastAPI backend (api) + the Next.js UI
# (frontend). Copy .env.example to .env and fill in your secrets first — the api
# reads it; Config's fail-fast validation (Part C) means a misconfigured .env
# fails the api container at startup with a clear error instead of partially
# booting. Single uvicorn worker by default (correct for the in-process upload-
# job tracking; set REDIS_URL to make the cache + rate limiter multi-worker-safe
# — see DEPLOY.md).
services:
  api:
    build: .
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-next
      args:
        # NEXT_PUBLIC_API_BASE is baked into the CLIENT bundle at BUILD time and
        # used by the BROWSER — so it must be a URL the browser can reach (the
        # host-published API), NOT the compose-internal http://api:8000. Override
        # for a real deployment (e.g. https://api.yourdomain.com).
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
